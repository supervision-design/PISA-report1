  return TWO_SLOT_SET.has(school);
}

const STORAGE_KEY = "pisa_submissions_v2";

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function daysUntil(deadline) {
  const now = new Date();
  const diffMs = deadline.getTime() - now.getTime();
  return Math.ceil(diffMs / (1000 * 60 * 60 * 24));
}

        if (result && result.value) {
          setSubmissions(JSON.parse(result.value));
        }
      } catch (e) {
        console.log("No existing data yet");
      }
      setLoaded(true);
    })();
  }, []);

  const persist = useCallback(async (data) => {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(data), true);
    } catch (e) {
      console.error("Save failed", e);
    }
  }, []);

  const openModal = (school) => {
    setModalSchool(school);
    if (isTwoSlotSchool(school)) {
      const existing = submissions[school];
      setModalImages(existing && typeof existing === "object" && !Array.isArray(existing)
        ? { p46: existing.p46 || null, m13: existing.m13 || null }
        : { p46: null, m13: null });
    } else {
      setModalImages(submissions[school] && Array.isArray(submissions[school]) ? [...submissions[school]] : []);
    }
  };

  const closeModal = () => {
    setModalSchool(null);
    setModalImages([]);
  };

  const handleFiles = async (fileList, slot) => {
    const file = fileList[0];
    if (!file) return;
    const dataUrl = await fileToDataUrl(file);
    if (slot) {
      setModalImages(prev => ({ ...prev, [slot]: dataUrl }));
    } else {
      setModalImages([dataUrl]);
    }
  };

  const removeImage = (slotOrIdx) => {
    if (modalSchool && isTwoSlotSchool(modalSchool)) {
      setModalImages(prev => ({ ...prev, [slotOrIdx]: null }));
    } else {
      setModalImages(prev => prev.filter((_, i) => i !== slotOrIdx));
    }
  };

  const isModalComplete = () => {
    if (!modalSchool) return false;
    if (isTwoSlotSchool(modalSchool)) {
      return !!(modalImages.p46 || modalImages.m13);
    }
    return modalImages.length > 0;
  };

  const saveModal = async () => {
    setSaving(true);
    const updated = { ...submissions };
    if (isTwoSlotSchool(modalSchool)) {
      if (modalImages.p46 || modalImages.m13) {
        updated[modalSchool] = { p46: modalImages.p46 || null, m13: modalImages.m13 || null };
      } else {
        delete updated[modalSchool];
      }
    } else {
      if (modalImages.length > 0) {
        updated[modalSchool] = modalImages;
      } else {
        delete updated[modalSchool];
      }
    }
    setSubmissions(updated);
    await persist(updated);
    setSaving(false);
    closeModal();
  };

  const clearSchool = async (school) => {
    const updated = { ...submissions };
    delete updated[school];
    setSubmissions(updated);
    await persist(updated);
  };

  const isSchoolSent = (school) => {
    const sub = submissions[school];
    if (!sub) return false;
    if (isTwoSlotSchool(school)) return !!(sub.p46 || sub.m13);
    return Array.isArray(sub) && sub.length > 0;
  };

  const sentCount = SCHOOLS.filter(isSchoolSent).length;
  const pendingCount = SCHOOLS.length - sentCount;
  const pct = Math.round((sentCount / SCHOOLS.length) * 100);
  const sentSchools = SCHOOLS.filter(isSchoolSent);
  const pendingSchools = SCHOOLS.filter(s => !isSchoolSent(s));

  const daysLeft = daysUntil(DEADLINE);
  let bannerClass = "ok";
  if (pendingCount === 0) bannerClass = "done";
  else if (daysLeft <= 0) bannerClass = "urgent";
  else if (daysLeft <= 3) bannerClass = "urgent";
  else if (daysLeft <= 7) bannerClass = "warn";

  const filtered = SCHOOLS.filter(s => {
    if (search && !s.includes(search)) return false;
    const isSent = isSchoolSent(s);
    if (filter === "sent" && !isSent) return false;
    if (filter === "pending" && isSent) return false;
    return true;
  });

  if (!loaded) {
    return <div className="app"><div className="loading-note">กำลังโหลดข้อมูล...</div></div>;
  }

  return (
    <div className="app">
      <div className="header">
        <div>
          <h1>ระบบรายงานผลการจัดกิจกรรมการเรียนรู้ที่เสริมสร้างสมรรถนะความฉลาดรู้ตามแนวทาง PISA</h1>
          <p>สพป.เชียงใหม่ เขต 2 — ให้โรงเรียนสรุปภาพกิจกรรมการจัดการเรียนรู้ ตามแนวทาง PISA ของนักเรียน เป็น info โรงเรียนละ 1 แผ่น (เก็บใน Google Drive)</p>
        </div>
        <div className="stats">
          <div className="stat sent"><div className="num">{sentCount}</div><div className="lbl">ส่งแล้ว</div></div>
          <div className="stat pending"><div className="num">{pendingCount}</div><div className="lbl">ยังไม่ส่ง</div></div>
          <div className="stat"><div className="num">{SCHOOLS.length}</div><div className="lbl">ทั้งหมด</div></div>
        </div>
      </div>

      <div className="progress-bar-wrap">
        <div className="progress-bar" style={{width: pct + "%"}}></div>
      </div>

      <div className={"deadline-banner " + bannerClass}>
        <div className="deadline-left">
          <div className="deadline-title">
            {pendingCount === 0
              ? "ครบทุกโรงเรียนแล้ว 🎉"
              : "กำหนดส่ง info สรุปกิจกรรม PISA"}
          </div>
          <div className="deadline-date">ภายในวันที่ 10 สิงหาคม 2569{pendingCount > 0 ? ` — ยังเหลือ ${pendingCount} โรงเรียนที่ยังไม่ส่ง` : ""}</div>
        </div>
        <div className="deadline-count">
          {pendingCount === 0
            ? "✓"
            : (daysLeft > 0 ? daysLeft : 0)}
          {pendingCount > 0 && <span className="unit">{daysLeft > 0 ? "วันที่เหลือ" : (daysLeft === 0 ? "วันสุดท้าย" : "เลยกำหนดแล้ว")}</span>}
        </div>
      </div>

      <div className="dashboard">
        <div className="dash-panel sent-panel">
          <h4>✅ ส่งแล้ว ({sentSchools.length})</h4>
          <ul className="dash-list">
            {sentSchools.length === 0
              ? <li className="dash-empty">ยังไม่มีโรงเรียนส่ง</li>
              : sentSchools.map(s => <li key={s}>{s}</li>)}
          </ul>
        </div>
        <div className="dash-panel pending-panel">
          <h4>⏳ ยังไม่ส่ง ({pendingSchools.length})</h4>
          <ul className="dash-list">
            {pendingSchools.length === 0
              ? <li className="dash-empty">ส่งครบทุกโรงเรียนแล้ว</li>
              : pendingSchools.map(s => <li key={s}>{s}</li>)}
          </ul>
        </div>
      </div>

      <div className="toolbar">
        <input
          className="search"
          placeholder="ค้นหาชื่อโรงเรียน..."
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
        <button className={"filter-btn" + (filter === "all" ? " active" : "")} onClick={() => setFilter("all")}>ทั้งหมด</button>
        <button className={"filter-btn" + (filter === "sent" ? " active" : "")} onClick={() => setFilter("sent")}>ส่งแล้ว</button>
        <button className={"filter-btn" + (filter === "pending" ? " active pending-active" : "")} onClick={() => setFilter("pending")}>ยังไม่ส่ง</button>
      </div>

      <div className="grid">
        {filtered.map(school => {
          const twoSlot = isTwoSlotSchool(school);
          const sub = submissions[school];
          const sent = isSchoolSent(school);
          let countLabel = "";
          if (twoSlot && sub) {
            const n = (sub.p46 ? 1 : 0) + (sub.m13 ? 1 : 0);
            countLabel = `${n}/2`;
          } else if (!twoSlot && sub) {
            countLabel = `${sub.length}`;
          }
          return (
            <div className="card" key={school}>
              <div className="card-top">
                <div className="school-name">{school}</div>
                <div className={"badge " + (sent ? "sent" : "pending")}>
                  {sent ? `ส่งแล้ว (${countLabel})` : "ยังไม่ส่ง"}
                </div>
              </div>
              {twoSlot ? (
                <div className="thumbs thumbs-double">
                  <div className="thumb-col">
                    {sub && sub.p46
                      ? <img className="thumb thumb-double" src={sub.p46} onClick={() => setLightboxImg(sub.p46)} />
                      : <div className="thumb-slot thumb-double"></div>}
                    <div className="thumb-label">ป.4-6</div>
                  </div>
                  <div className="thumb-col">
                    {sub && sub.m13
                      ? <img className="thumb thumb-double" src={sub.m13} onClick={() => setLightboxImg(sub.m13)} />
                      : <div className="thumb-slot thumb-double"></div>}
                    <div className="thumb-label">ม.1-3</div>
                  </div>
                </div>
              ) : (
                <div className="thumbs thumbs-single">
                  {sub && sub[0]
                    ? <img className="thumb thumb-single" src={sub[0]} onClick={() => setLightboxImg(sub[0])} />
                    : <div className="thumb-slot thumb-single"></div>}
                </div>
              )}
              <div className="card-actions">
                <button className="btn btn-upload" onClick={() => openModal(school)}>
                  {sent ? "แก้ไขภาพ" : "อัปโหลดภาพ"}
                </button>
                {sent && <button className="btn btn-clear" onClick={() => clearSchool(school)}>ล้างสถานะ</button>}
              </div>
              {sent && (
                <a className="drive-link" href={DRIVE_FOLDER_URL} target="_blank" rel="noopener noreferrer">
                  📁 เปิดโฟลเดอร์ Drive
                </a>
              )}
            </div>
          );
        })}
      </div>

      {modalSchool && (
        <div className="modal-overlay" onClick={closeModal}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{modalSchool}</h3>
            {isTwoSlotSchool(modalSchool) ? (
              <>
                <div className="sub">แนบภาพ info สรุปกิจกรรม 2 ช่วงชั้น (ช่องละ 1 แผ่น)</div>
                <div className="slot-row">
                  <div className="slot-block">
                    <div className="slot-label">ป.4-6</div>
                    {modalImages.p46 ? (
                      <div className="preview-item">
                        <img src={modalImages.p46} />
                        <button className="remove-x" onClick={() => removeImage("p46")}>×</button>
                      </div>
                    ) : (
                      <label className="upload-zone upload-zone-slot">
                        คลิกเพื่อเลือกภาพ
                        <input
                          type="file"
                          accept="image/*"
                          style={{display: "none"}}
                          onChange={e => { handleFiles(e.target.files, "p46"); e.target.value = ""; }}
                        />
                      </label>
                    )}
                  </div>
                  <div className="slot-block">
                    <div className="slot-label">ม.1-3</div>
                    {modalImages.m13 ? (
                      <div className="preview-item">
                        <img src={modalImages.m13} />
                        <button className="remove-x" onClick={() => removeImage("m13")}>×</button>
                      </div>
                    ) : (
                      <label className="upload-zone upload-zone-slot">
                        คลิกเพื่อเลือกภาพ
                        <input
                          type="file"
                          accept="image/*"
                          style={{display: "none"}}
                          onChange={e => { handleFiles(e.target.files, "m13"); e.target.value = ""; }}
                        />
                      </label>
                    )}
                  </div>
                </div>
              </>
            ) : (
              <>
                <div className="sub">แนบภาพ info สรุปกิจกรรม PISA (1 แผ่น)</div>

                {modalImages.length === 0 && (
                  <div className="upload-zone" onClick={() => fileInputRef.current.click()}>
                    คลิกเพื่อเลือกภาพ (1 ภาพ)
                    <input
                      ref={fileInputRef}
                      type="file"
                      accept="image/*"
                      style={{display: "none"}}
                      onChange={e => { handleFiles(e.target.files); e.target.value = ""; }}
                    />
                  </div>
                )}

                {modalImages.length > 0 && (
                  <div className="preview-grid preview-grid-single">
                    <div className="preview-item">
                      <img src={modalImages[0]} />
                      <button className="remove-x" onClick={() => removeImage(0)}>×</button>
                    </div>
                  </div>
                )}
              </>
            )}

            <div className="modal-footer">
              <button className="btn-secondary" onClick={closeModal}>ยกเลิก</button>
              <button className="btn-primary" onClick={saveModal} disabled={saving || !isModalComplete()}>
                {saving ? "กำลังบันทึก..." : "บันทึก"}
              </button>
            </div>
          </div>
        </div>
      )}

      {lightboxImg && (
        <div className="lightbox" onClick={() => setLightboxImg(null)}>
          <img src={lightboxImg} />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
